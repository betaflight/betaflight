# Builds Betaflight Firmware.
#

name: CI

on:
  workflow_call:
    inputs:
      release_build:
        description: 'Specifies if it is a build that should include commit hash in hex file names or not'
        default: false
        required: false
        type: boolean

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.get-targets.outputs.targets }}
      sdk-cache-key: ${{ steps.sdk-info.outputs.key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Init config submodule
        run: git submodule update --init -- src/config

      - name: Get SDK cache info
        id: sdk-info
        run: |
          echo "paths<<EOF" >> $GITHUB_OUTPUT
          make platform-sdk-paths-print >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "key=${{ runner.os }}-sdks-v1-$(make platform-sdk-key-print | tr -s ' ' '-')" >> $GITHUB_OUTPUT

      - name: Cache platform SDKs
        uses: actions/cache@v4
        id: cache-sdks
        with:
          path: ${{ steps.sdk-info.outputs.paths }}
          key: ${{ steps.sdk-info.outputs.key }}

      - name: Hydrate platform SDKs
        if: steps.cache-sdks.outputs.cache-hit != 'true'
        run: make platform-sdks-hydrate

      - name: Cache build toolchain
        uses: actions/cache@v4
        id: cache-toolchain
        with:
          path: tools
          key: ${{ runner.os }}-tools-v2-${{ hashFiles('mk/tools.mk', 'src/platform/*/mk/*.mk') }}

      - name: Download and install toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: make arm_sdk_install

      - name: Install platform tools
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: make platform-tools-install

      - name: Hydrate configuration
        id: get-config
        run: make configs

      - name: Get all official build targets
        id: get-targets
        run: echo "targets=$(make targets-ci-print | jq -R -c 'split(" ")')" >> $GITHUB_OUTPUT

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJson(needs.setup.outputs.targets) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Init config submodule
        run: git submodule update --init -- src/config

      - name: Get SDK cache paths
        id: sdk-info
        run: |
          echo "paths<<EOF" >> $GITHUB_OUTPUT
          make platform-sdk-paths-print
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Restore platform SDKs from cache
        uses: actions/cache/restore@v4
        id: cache-sdks
        with:
          path: ${{ steps.sdk-info.outputs.paths }}
          key: ${{ needs.setup.outputs.sdk-cache-key }}

      - name: Hydrate platform SDKs (fallback)
        if: steps.cache-sdks.outputs.cache-hit != 'true'
        run: make platform-sdks-hydrate

      - name: Fetch toolchain from cache
        uses: actions/cache/restore@v4
        id: cache-toolchain
        with:
          path: tools
          key: ${{ runner.os }}-tools-v2-${{ hashFiles('mk/tools.mk', 'src/platform/*/mk/*.mk') }}

      - name: Install ARM toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: make arm_sdk_install

      - name: Install platform tools
        run: make platform-tools-install

      - name: Hydrate configuration
        id: get-config
        run: make configs

      - name: Build target (without revision)
        if: inputs.release_build == true
        run: make EXTRA_FLAGS=-Werror ${{ matrix.target }}

      - name: Build target (with revision)
        if: inputs.release_build == false
        run: make EXTRA_FLAGS=-Werror ${{ matrix.target }}_rev

      - name: Publish build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            obj/*.hex
            obj/*.uf2
            obj/*_${{ matrix.target }}*
          retention-days: 60

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get install -y libblocksruntime-dev clang-18

      - name: Run sanity checks
        run: make EXTRA_FLAGS=-Werror checks

      - name: Run all unit tests
        run: make EXTRA_FLAGS=-Werror test-all

  result:
    name: Complete
    needs: [build, test]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check build matrix result
        if: ${{ needs.build.result != 'success' }}
        run: exit 1

      - name: Check test result
        if: ${{ needs.test.result != 'success' }}
        run: exit 1
