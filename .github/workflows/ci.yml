# Builds Betaflight Firmware.
#

name: CI

on:
  workflow_call:
    inputs:
      release_build:
        description: 'Specifies if it is a build that should include commit hash in hex file names or not'
        default: false
        required: false
        type: boolean

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.get-targets.outputs.targets }}
      pico-sdk-key: ${{ steps.sdk-keys.outputs.pico-sdk }}
      stm32n6-key: ${{ steps.sdk-keys.outputs.stm32n6 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Init config submodule
        run: git submodule update --init -- src/config

      - name: Compute SDK cache keys
        id: sdk-keys
        run: |
          echo "pico-sdk=${{ runner.os }}-pico-sdk-$(git rev-parse HEAD:lib/main/pico-sdk)" >> $GITHUB_OUTPUT
          echo "stm32n6=${{ runner.os }}-stm32n6-$(git rev-parse HEAD:lib/main/STM32N6)" >> $GITHUB_OUTPUT

      - name: Cache pico-sdk
        uses: actions/cache@v4
        id: cache-pico-sdk
        with:
          path: |
            lib/main/pico-sdk
            .git/modules/lib/main/pico-sdk
          key: ${{ steps.sdk-keys.outputs.pico-sdk }}

      - name: Hydrate pico-sdk
        if: steps.cache-pico-sdk.outputs.cache-hit != 'true'
        run: git submodule update --init --checkout --recursive -- lib/main/pico-sdk

      - name: Cache STM32CubeN6
        uses: actions/cache@v4
        id: cache-stm32n6
        with:
          path: |
            lib/main/STM32N6
            .git/modules/lib/main/STM32N6
          key: ${{ steps.sdk-keys.outputs.stm32n6 }}

      - name: Hydrate STM32CubeN6
        if: steps.cache-stm32n6.outputs.cache-hit != 'true'
        run: git submodule update --init --checkout -- lib/main/STM32N6

      - name: Cache build toolchain
        uses: actions/cache@v4
        id: cache-toolchain
        with:
          path: tools
          key: ${{ runner.os }}-tools-v2-${{ hashFiles('mk/tools.mk', 'src/platform/*/mk/*.mk') }}

      - name: Download and install toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: make arm_sdk_install

      - name: Build pico tool and install
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: make picotool_install

      - name: Hydrate configuration
        id: get-config
        run: make configs

      - name: Get all official build targets
        id: get-targets
        run: echo "targets=$(make targets-ci-print | jq -R -c 'split(" ")')" >> $GITHUB_OUTPUT

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJson(needs.setup.outputs.targets) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Init config submodule
        run: git submodule update --init -- src/config

      - name: Detect target platform
        id: platform
        run: |
          if [ -d "src/platform/PICO/target/${{ matrix.target }}" ]; then
            echo "sdk=pico" >> $GITHUB_OUTPUT
          elif [ -d "src/platform/STM32/target/${{ matrix.target }}" ]; then
            MCU_FAMILY=$(sed -n 's/^TARGET_MCU_FAMILY\s*:=\s*//p' "src/platform/STM32/target/${{ matrix.target }}/target.mk")
            if [ "$MCU_FAMILY" = "STM32N6" ]; then
              echo "sdk=stm32n6" >> $GITHUB_OUTPUT
            else
              echo "sdk=none" >> $GITHUB_OUTPUT
            fi
          else
            echo "sdk=none" >> $GITHUB_OUTPUT
          fi

      - name: Restore pico-sdk from cache
        if: steps.platform.outputs.sdk == 'pico'
        uses: actions/cache/restore@v4
        with:
          path: |
            lib/main/pico-sdk
            .git/modules/lib/main/pico-sdk
          key: ${{ needs.setup.outputs.pico-sdk-key }}

      - name: Restore STM32CubeN6 from cache
        if: steps.platform.outputs.sdk == 'stm32n6'
        uses: actions/cache/restore@v4
        with:
          path: |
            lib/main/STM32N6
            .git/modules/lib/main/STM32N6
          key: ${{ needs.setup.outputs.stm32n6-key }}

      - name: Fetch toolchain from cache
        uses: actions/cache/restore@v4
        id: cache-toolchain
        with:
          path: tools
          key: ${{ runner.os }}-tools-v2-${{ hashFiles('mk/tools.mk', 'src/platform/*/mk/*.mk') }}

      - name: Install ARM toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: make arm_sdk_install

      - name: Install PICO toolchain
        if: steps.platform.outputs.sdk == 'pico'
        run: make picotool_install

      - name: Hydrate configuration
        id: get-config
        run: make configs

      - name: Build target (without revision)
        if: inputs.release_build == true
        run: make EXTRA_FLAGS=-Werror ${{ matrix.target }}

      - name: Build target (with revision)
        if: inputs.release_build == false
        run: make EXTRA_FLAGS=-Werror ${{ matrix.target }}_rev

      - name: Publish build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            obj/*.hex
            obj/*.uf2
            obj/*_${{ matrix.target }}*
          retention-days: 60

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get install -y libblocksruntime-dev clang-18

      - name: Run sanity checks
        run: make EXTRA_FLAGS=-Werror checks

      - name: Run all unit tests
        run: make EXTRA_FLAGS=-Werror test-all

  result:
    name: Complete
    needs: [build, test]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check build matrix result
        if: ${{ needs.build.result != 'success' }}
        run: exit 1

      - name: Check test result
        if: ${{ needs.test.result != 'success' }}
        run: exit 1
